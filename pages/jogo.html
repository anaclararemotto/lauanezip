<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLICA AÍ, LUANA</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        background: #ffc0dd;
        font-family: "Comic Neue", cursive;
        overflow: hidden;
        cursor: pointer;
      }

      #titulo {
        position: fixed;
        top: 16px;
        left: 16px;
        background: #fff;
        padding: 8px 12px;
        transform: rotate(-2deg);
        font-size: 14px;
      }

      #contador {
        position: fixed;
        bottom: 16px;
        right: 16px;
        font-size: 12px;
        opacity: 0.5;
      }

      .mensagem {
        position: absolute;
        background: #fff;
        padding: 6px 10px;
        font-size: 14px;
        transform: rotate(var(--rot));
        animation: sumir 3s forwards;
      }

      @keyframes sumir {
        to {
          opacity: 0;
          transform: translateY(-20px) rotate(var(--rot));
        }
      }

      img.colagem {
        position: absolute;
        width: 90px;
        pointer-events: none;
        opacity: 0.9;
      }

      #naoClique {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(3deg);
        background: #ff5fa2;
        color: #fff;
        padding: 12px 16px;
        font-size: 16px;
      }

      @keyframes respirar {
        0% {
          background-color: #ffc0dd;
        }
        50% {
          background-color: #ff9fc9;
        }
        100% {
          background-color: #ffc0dd;
        }
      }

      body {
        animation: respirar 6s infinite ease-in-out;
      }
    </style>
  </head>

  <body>
